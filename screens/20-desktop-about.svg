  </g><text x="80" y="790" font-family="Onest, Inter, Arial, sans-serif" font-size="40" font-weight="700" fill="#13151A" text-anchor="start" letter-spacing="0" opacity="1"><tspan x="80" dy="0">Почему это удобно</tspan></text><rect x="80" y="860" width="406" height="360" rx="20" fill="#EEF4FF" /><text x="110" y="915" font-family="Onest, Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#005BFF" text-anchor="start" letter-spacing="0" opacity="1"><tspan x="110" dy="0">01</tspan></text><text x="110" y="980" font-family="Onest, Inter, Arial, sans-serif" font-size="24" font-weight="680" fill="#13151A" text-anchor="start" letter-spacing="0" opacity="1"><tspan x="110" dy="0">Реальные дизайн-сценарии</tspan></text><text x="110" y="1090" font-family="Onest, Inter, Arial, sans-serif" font-size="15" font-weight="430" fill="#6C717C" text-anchor="start" letter-spacing="0" opacity="1"><tspan x="110" dy="0">Не отдельные товары, а целостные</tspan><tspan x="110" dy="24">пространства с понятной логикой</tspan><tspan x="110" dy="24">решений.</tspan></text><rect x="506" y="860" width="406" height="360" rx="20" fill="#F2EEE7" /><text x="536" y="915" font-family="Onest, Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#005BFF" text-anchor="start" letter-spacing="0" opacity="1"><tspan x="536" dy="0">02</tspan></text><text x="536" y="980" font-family="Onest, Inter, Arial, sans-serif" font-size="24" font-weight="680" fill="#13151A" text-anchor="start" letter-spacing="0" opacity="1"><tspan x="536" dy="0">Компании и проекты в одном</tspan><tspan x="536" dy="31">каталоге</tspan></text><text x="536" y="1090" font-family="Onest, Inter, Arial, sans-serif" font-size="15" font-weight="430" fill="#6C717C" text-anchor="start" letter-spacing="0" opacity="1"><tspan x="536" dy="0">Можно сразу увидеть автора проекта и</tspan><tspan x="536" dy="24">познакомиться с другими его работами.</tspan></text><rect x="932" y="860" width="406" height="360" rx="20" fill="#FFF0F6" /><text x="962" y="915" font-family="Onest, Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#F43F8C" text-anchor="start" letter-spacing="0" opacity="1"><tspan x="962" dy="0">03</tspan></text><text x="962" y="980" font-family="Onest, Inter, Arial, sans-serif" font-size="24" font-weight="680" fill="#13151A" text-anchor="start" letter-spacing="0" opacity="1"><tspan x="962" dy="0">Переход от идеи к товарам</tspan></text><text x="962" y="1090" font-family="Onest, Inter, Arial, sans-serif" font-size="15" font-weight="430" fill="#6C717C" text-anchor="start" letter-spacing="0" opacity="1"><tspan x="962" dy="0">Понравившийся образ превращается в</tspan><tspan x="962" dy="24">конкретный список предметов для</tspan><tspan x="962" dy="24">интерьера.</tspan></text><rect x="80" y="1325" width="1280" height="250" rx="22" fill="#EEF4FF" /><text x="120" y="1405" font-family="Onest, Inter, Arial, sans-serif" font-size="32" font-weight="700" fill="#13151A" text-anchor="start" letter-spacing="0" opacity="1"><tspan x="120" dy="0">Готовы найти своё пространство?</tspan></text><text x="120" y="1455" font-family="Onest, Inter, Arial, sans-serif" font-size="16" font-weight="430" fill="#6C717C" text-anchor="start" letter-spacing="0" opacity="1"><tspan x="120" dy="0">Начните с категории, комнаты или стиля.</tspan></text><g id="HOTSPOT__ABOUT__OPEN_CATALOG" data-name="HOTSPOT__ABOUT__OPEN_CATALOG"><rect x="1100" y="1418" width="200" height="52" rx="12" fill="#005BFF" /><text x="1200" y="1451" font-family="Onest, Inter, Arial, sans-serif" font-size="14" font-weight="650" fill="#FFFFFF" text-anchor="middle" letter-spacing="0" opacity="1"><tspan x="1200" dy="0">Перейти в каталог</tspan></text><rect id="HOTSPOT__ABOUT__OPEN_CATALOG__TARGET" data-name="HOTSPOT__ABOUT__OPEN_CATALOG__TARGET" x="1100" y="1418" width="200" height="52" rx="8" fill="#FFFFFF" fill-opacity="0.001"/></g></g>
