 Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#F43F8C" text-anchor="start" letter-spacing="0" opacity="1"><tspan x="140" dy="0">О проекте</tspan></text><text x="140" y="330" font-family="Onest, Inter, Arial, sans-serif" font-size="56" font-weight="740" fill="#FFFFFF" text-anchor="start" letter-spacing="0" opacity="1"><tspan x="140" dy="0">От вдохновения —</tspan><tspan x="140" dy="64">к конкретным решениям</tspan></text><text x="140" y="500" font-family="Onest, Inter, Arial, sans-serif" font-size="19" font-weight="430" fill="#CFD2D8" text-anchor="start" letter-spacing="0" opacity="1"><tspan x="140" dy="0">Ozon Design помогает переходить от вдохновения к конкретным</tspan><tspan x="140" dy="30">решениям: смотреть реализованные пространства, знакомиться со</tspan><tspan x="140" dy="30">студиями и находить товары, использованные в проектах.</tspan></text><g id="ART__ABOUT_HERO" data-name="ART__ABOUT_HERO" transform="translate(940 170)">
